name: Build Memos for Windows x64

on:
  workflow_dispatch: # 允许你手动点击按钮触发构建

jobs:
  build-windows:
    runs-on: ubuntu-latest # 使用标准的 Linux 虚拟机作为构建机

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 构建前端 (Memos 是前后端分离的)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm & Build Frontend
        run: |
          npm install -g pnpm
          cd web
          pnpm install
          pnpm build
          cd ..

      - name: Copy Frontend to Embed Path
        run: |
          mkdir -p ./server/router/frontend/dist
          cp -r ./web/dist/* ./server/router/frontend/dist/

      # 2. 构建 Go 后端 (关键步骤：交叉编译)
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Debug - Find embed files
        run: |
          find . -name "*.go" | xargs grep -l "go:embed" 2>/dev/null
          echo "---"
          ls web/dist 2>/dev/null || echo "web/dist not found"

      - name: Debug - Show frontend embed
        run: cat ./server/router/frontend/frontend.go

      - name: Build Windows Binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          # 注意：Memos 的 main 函数通常在 ./bin/memos/main.go
          # 我们直接指定构建目标路径
          go build -ldflags="-s -w" -o memos-windows-x64.exe ./cmd/memos

      # 3. 将编译好的 .exe 上传到 GitHub 界面供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: memos-windows-x64-binary
          path: memos-windows-x64.exe
